<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recheck OAuth Test Client</title>
    <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@1.*/css/pico.min.css">
    <style>
        pre { white-space: pre-wrap; }
    </style>
</head>
<body>
    <main class="container">
        <h2>Recheck OAuth Test Client</h2>
        <form>
            <label for="recheckHost">
                Recheck Endpoint:
                <input type="text" id="recheckEndpoint" name="recheckEndpoint" required>
            </label>
            <label for="clientId">
                Client ID:
                <input type="text" id="clientId" name="clientId" required>
            </label>
            <label for="scope">
                Scope:
                <input type="text" id="scope" name="scope" required>
            </label>
            <label for="loginHint">
                Login Hint (optional):
                <input type="text" id="loginHint" name="loginHint" placeholder="email@example.com">
            </label>
            <label for="recheckToken">
                Recheck Token (for selfie reverification):
                <input type="text" id="recheckToken" name="recheckToken" placeholder="Recheck token from your backend">
            </label>
            <div style="margin-bottom: 1rem;">
                <label for="delayRedirect" style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="delayRedirect" name="delayRedirect">
                    <span>Delay 10s before redirect</span>
                </label>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <img id="loginButton" src="/verify-with-recheck-light.png" style="height: 50px; cursor: pointer"/>
                <span>or</span>
                <button type="button" id="reverifyButton" style="height: 50px; margin: 0; padding: 0 1.5rem; font-size: 0.875rem; width: auto;">Selfie Reverification</button>
            </div>
        </form>
        <div id="response"></div>
    </main>
    <script src="app.js"></script>
</body>
</html>
